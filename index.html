<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Si-WAJAH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { background-color: #f4f6f9; padding-top: 20px; font-family: sans-serif; }
    
    /* Warna Biru Khas Aplikasi */
    .btn-primary { background-color: #0a58ca; border-color: #0a58ca; }
    .btn-primary:hover { background-color: #084298; border-color: #084298; }
    .nav-pills .nav-link.active, .nav-pills .show > .nav-link { background-color: #0a58ca; }
    
    #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
    video { 
      width: 100%; 
      height: auto; 
      min-height: 240px; 
      border-radius: 10px; 
      background-color: #222; 
      object-fit: cover; 
    }
    /* Efek cermin hanya aktif saat menggunakan kamera depan (user) */
    .mirror { transform: scaleX(-1); }
    
    .status-card { min-height: 80px; font-weight: bold; font-size: 1.2rem; }
    .max-width-500 { max-width: 500px; }
    .logo-sekolah { max-height: 45px; object-fit: contain; }
  </style>
</head>
<body>

<div class="container text-center">
  <div class="d-flex align-items-center justify-content-center mb-3">
    <img src="https://lh3.googleusercontent.com/u/0/d/1NmhujSqCWX3fY30wSlAe9Ur5aR0jevXc" class="logo-sekolah me-2" alt="Logo Sekolah">
    <h3 class="m-0">Sistem Presensi Wajah SMAN 9 Surabaya</h3>
  </div>
  
  <ul class="nav nav-pills justify-content-center mb-3" id="menuTab" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" id="absen-tab" data-bs-toggle="tab" data-bs-target="#absen-panel" onclick="aktifkanModeAbsen()">Mode Presensi</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin-panel" onclick="bukaMenuAdmin()">Pendaftaran & Rekap</button>
    </li>
  </ul>

  <div id="status-sistem" class="alert alert-warning mb-3 mx-auto max-width-500">Mengunduh Model AI & Database Wajah... Mohon Tunggu.</div>
  
  <div id="video-container" class="mb-2">
    <video id="webcam" class="mirror" autoplay playsinline muted></video>
  </div>

  <div class="mb-2">
    <button id="btn-ganti-kamera" class="btn btn-secondary btn-sm d-none mx-auto" onclick="toggleKameraAdmin()">🔄 Alihkan Kamera Belakang/Depan</button>
  </div>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="absen-panel">
      <div id="log-absen-terakhir" class="card status-card d-flex align-items-center justify-content-center p-3 bg-white shadow-sm mx-auto max-width-500">
        Silakan berdiri di depan kamera untuk absen
      </div>
    </div>

    <div class="tab-pane fade" id="admin-panel">
      <div id="form-registrasi-container" class="card p-3 shadow-sm text-start mx-auto mb-3 max-width-500">
        <h5 class="mb-2 text-primary">Form Registrasi Siswa Baru</h5>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <input type="text" id="reg-id" class="form-control form-control-sm" placeholder="NIS / ID Siswa">
          </div>
          <div class="col-6">
            <input type="text" id="reg-kelas" class="form-control form-control-sm" placeholder="Kelas (X-MIPA-1)">
          </div>
        </div>
        <div class="mb-2">
          <input type="text" id="reg-nama" class="form-control form-control-sm" placeholder="Nama Lengkap Siswa">
        </div>
        <button class="btn btn-primary btn-sm w-100 mb-3" onclick="tangkapDanDaftarWajah()">Pindai & Daftarkan Wajah</button>
        
        <hr class="my-2">
        <h5 class="mb-2 text-success">Menu Manajemen & Laporan</h5>
        <button class="btn btn-success btn-sm w-100 mb-2" onclick="manualSync()">🔄 Sinkronisasi Ulang Data Induk Kiosk</button>
        <button class="btn btn-danger btn-sm w-100" onclick="prosesRekapHarian()">📊 Buat Sheet Rekap Kehadiran Hari Ini</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // URL BACKEND GAS
  const URL_API_GAS = "https://script.google.com/macros/s/AKfycbzMK6ITHRXJ8gcawWQ57fqotqSpS5EmGb85dhJY9Nz07HisK88rP7hRu1c3_4hRB1dY/exec";

  let databaseWajahLokal = [];
  let faceMatcher = null;
  let jedaAbsenUser = false;
  let modeAdminAktif = false;
  let currentFacingMode = "user"; 
  let localStream = null;

  window.onload = function() {
    const statusBox = document.getElementById('status-sistem');
    
    mulaiKamera(currentFacingMode);
    
    statusBox.className = "alert alert-warning mb-3 mx-auto max-width-500";
    statusBox.innerText = "Kamera aktif. Memuat modul kecerdasan buatan (AI)...";

    setTimeout(async () => {
      try {
        const MODEL_URL = 'https://unpkg.com/@vladmandic/face-api/model/';
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        await sinkronisasiDatabase();
        
        statusBox.className = "alert alert-success mb-3 mx-auto max-width-500";
        statusBox.innerText = "Sistem Siap! AI & Database Wajah Aktif.";
      } catch (err) {
        console.error("AI gagal dimuat:", err);
        statusBox.className = "alert alert-danger mb-3 mx-auto max-width-500";
        statusBox.innerText = "Gagal memuat AI. Periksa koneksi internet.";
      }
    }, 100);
    
    setInterval(prosesMengenaliWajahBerkala, 500);
  };

  function mulaiKamera(facingMode) {
    const video = document.getElementById('webcam');
    
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
    }

    navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: facingMode }, 
      audio: false 
    })
    .then(stream => {
      localStream = stream;
      video.srcObject = stream;
      
      if (facingMode === "user") {
        video.classList.add('mirror');
      } else {
        video.classList.remove('mirror');
      }

      video.onloadedmetadata = function() {
        video.play().catch(e => console.log("Gagal play otomatis:", e));
      };
    })
    .catch(err => {
      console.error("Gagal akses kamera:", err);
      alert("Gagal mengakses kamera jenis " + facingMode + ": " + err.message);
    });
  }

  function toggleKameraAdmin() {
    currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
    mulaiKamera(currentFacingMode);
  }

  async function sinkronisasiDatabase() {
    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "ambil_induk" })
      });
      const hasil = await response.json();
      const dataDariSheets = hasil.data;

      if (!dataDariSheets || dataDariSheets.length === 0) {
        databaseWajahLokal = [];
        faceMatcher = null;
        return;
      }

      const labeledDescriptors = [];
      dataDariSheets.forEach(user => {
        try {
          if (user.vektorTeks) {
            const descriptorArray = new Float32Array(JSON.parse(user.vektorTeks));
            labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(user.id + "||" + user.nama + "||" + user.kelas, [descriptorArray]));
          }
        } catch(e) { console.error("Gagal membaca data user:", e); }
      });

      if(labeledDescriptors.length > 0) {
        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.4);
      }
    } catch (err) {
      console.error("Gagal sinkronisasi data dari Sheets:", err);
    }
  }

  async function manualSync() {
    document.getElementById('status-sistem').innerText = "Menyinkronkan data induk...";
    await sinkronisasiDatabase();
    document.getElementById('status-sistem').innerText = "Sinkronisasi Berhasil!";
    alert("Database lokal Kiosk berhasil diperbarui!");
  }

  async function prosesMengenaliWajahBerkala() {
    const video = document.getElementById('webcam');
    if (!video.srcObject || jedaAbsenUser || modeAdminAktif || !faceMatcher) return;

    const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

    if (deteksi) {
      const hasilCocok = faceMatcher.findBestMatch(deteksi.descriptor);
      if (hasilCocok.label !== 'unknown') {
        const [id, nama, kelas] = hasilCocok.label.split('||');
        
        // --- LOGIKA LOCK ONESHOOT HARIAN ---
        const tanggalHariIni = new Date().toISOString().split('T')[0]; // Format: YYYY-MM-DD
        const kunciLokalSiswa = localStorage.getItem("absen_" + id);

        // Jika di HP ini sudah tersimpan tanda bahwa ID tersebut sudah absen pada tanggal hari ini, skip!
        if (kunciLokalSiswa === tanggalHariIni) {
          return; 
        }

        eksekusiKirimAbsenKeGAS(id, nama, kelas, tanggalHariIni);
      }
    }
  }

  async function eksekusiKirimAbsenKeGAS(id, nama, kelas, tanggalHariIni) {
    jedaAbsenUser = true;
    const logBox = document.getElementById('log-absen-terakhir');
    logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-warning text-dark shadow-sm mx-auto max-width-500";
    logBox.innerText = "Mencatat kehadiran " + nama + " (" + kelas + ")...";

    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "catat_absen", id: id, nama: nama, kelas: kelas })
      });
      await response.json();

      // SUKSES: Kunci ID siswa ini khusus untuk tanggal hari ini
      localStorage.setItem("absen_" + id, tanggalHariIni);

      logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-success text-white shadow-sm mx-auto max-width-500";
      logBox.innerHTML = "🎯 ABSEN BERHASIL!<br>" + nama + "<br>Kelas: " + kelas;
    } catch (err) {
      logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-danger text-white shadow-sm mx-auto max-width-500";
      logBox.innerText = "Gagal mengirim data absen ke server.";
    }

    setTimeout(() => {
      logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-white text-dark shadow-sm mx-auto max-width-500";
      logBox.innerText = "Silakan berdiri di depan kamera untuk absen";
      jedaAbsenUser = false;
    }, 3000);
  }

  async function tangkapDanDaftarWajah() {
    const id = document.getElementById('reg-id').value.trim();
    const nama = document.getElementById('reg-nama').value.trim();
    const kelas = document.getElementById('reg-kelas').value.trim();
    const video = document.getElementById('webcam');
    
    if (!id || !nama || !kelas) { alert("Semua kolom form wajib diisi!"); return; }

    document.getElementById('status-sistem').innerText = "Sedang memindai wajah... Mohon tidak bergerak.";

    const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
    if (!deteksi) { 
      document.getElementById('status-sistem').innerText = "Mode Pendaftaran: Silakan isi data lalu klik Pindai.";
      alert("Wajah tidak terdeteksi! Pastikan wajah siswa terlihat jelas di layar kamera."); 
      return; 
    }

    const descriptorString = JSON.stringify(Array.from(deteksi.descriptor));
    
    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "simpan_wajah", id: id, nama: nama, kelas: kelas, descriptor: descriptorString })
      });
      const respons = await response.json();
      alert(respons.status);
      
      document.getElementById('reg-id').value = "";
      document.getElementById('reg-nama').value = "";
      document.getElementById('reg-kelas').value = "";
      
      await sinkronisasiDatabase();
      aktifkanModeAbsen();
    } catch(e) {
      alert("Gagal mendaftarkan wajah baru.");
    }
  }

  async function prosesRekapHarian() {
    if (!confirm("Apakah Anda ingin membuat rekapitulasi kehadiran berdasarkan kelas untuk hari ini?")) return;
    
    document.getElementById('status-sistem').className = "alert alert-warning mb-3 mx-auto max-width-500";
    document.getElementById('status-sistem').innerText = "Sedang menyusun laporan rekap... Silakan tunggu.";
    
    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "buat_rekap" })
      });
      const respons = await response.json();
      alert(respons.status);
    } catch (e) {
      alert("Gagal memproses rekap harian.");
    }
    aktifkanModeAbsen();
  }

  function bukaMenuAdmin() {
    const pin = prompt("Masukkan PIN Keamanan Admin:");
    if (pin === "1234") {
      modeAdminAktif = true;
      
      document.getElementById('btn-ganti-kamera').classList.remove('d-none');
      
      currentFacingMode = "environment";
      mulaiKamera(currentFacingMode);

      const adminTabEl = document.getElementById('admin-tab');
      const tab = bootstrap.Tab.getOrCreateInstance(adminTabEl);
      tab.show();
      document.getElementById('status-sistem').innerText = "Mode Pendaftaran: Kamera Belakang Aktif.";
    } else {
      alert("PIN Salah!");
      aktifkanModeAbsen();
    }
  }

  function aktifkanModeAbsen() {
    modeAdminAktif = false;
    
    document.getElementById('btn-ganti-kamera').classList.add('d-none');
    
    currentFacingMode = "user";
    mulaiKamera(currentFacingMode);

    const absenTabEl = document.getElementById('absen-tab');
    const tab = bootstrap.Tab.getOrCreateInstance(absenTabEl);
    tab.show();
    document.getElementById('status-sistem').className = "alert alert-success mb-3 mx-auto max-width-500";
    document.getElementById('status-sistem').innerText = "Sistem Siap! AI & Database Wajah Aktif.";
  }
</script>
</body>
</html>

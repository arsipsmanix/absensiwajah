<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Presensi Sekolah AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/@vladmandic/face-api/dist/face-api.js"></script>
  <style>
    body { background-color: #f4f6f9; padding-top: 20px; font-family: sans-serif; }
    #video-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
    video { 
      width: 100%; 
      height: auto; 
      min-height: 240px; 
      border-radius: 10px; 
      background-color: #222; 
      transform: scaleX(-1); 
      object-fit: cover; 
    }
    .status-card { min-height: 80px; font-weight: bold; font-size: 1.2rem; }
    .max-width-500 { max-width: 500px; }
  </style>
</head>
<body>

<div class="container text-center">
  <h3 class="mb-3">🖳 KIOSK PRESENSI SEKOLAH AI</h3>
  
  <ul class="nav nav-pills justify-content-center mb-3" id="menuTab" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" id="absen-tab" data-bs-toggle="tab" data-bs-target="#absen-panel" onclick="aktifkanModeAbsen()">Mode Presensi</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin-panel" onclick="bukaMenuAdmin()">Pendaftaran & Rekap</button>
    </li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="absen-panel">
      <div id="status-sistem" class="alert alert-warning mb-3">Mengunduh Model AI & Database Wajah... Mohon Tunggu.</div>
      
      <div id="video-container" class="mb-3">
        <video id="webcam" autoplay playsinline muted></video>
      </div>
      
      <div id="log-absen-terakhir" class="card status-card d-flex align-items-center justify-content-center p-3 bg-white shadow-sm">
        Silakan berdiri di depan kamera untuk absen
      </div>
    </div>

    <div class="tab-pane fade" id="admin-panel">
      <div class="card p-4 shadow-sm text-start mx-auto max-width-500">
        <h5 class="mb-3">Form Registrasi Siswa Baru</h5>
        <div class="mb-3">
          <label class="form-label">NIS / ID Siswa</label>
          <input type="text" id="reg-id" class="form-control" placeholder="Contoh: 2026001">
        </div>
        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="reg-nama" class="form-control" placeholder="Contoh: Budi Sudarsono">
        </div>
        <div class="mb-3">
          <label class="form-label">Kelas</label>
          <input type="text" id="reg-kelas" class="form-control" placeholder="Contoh: X-MIPA-1">
        </div>
        <button class="btn btn-primary w-100 mb-3" onclick="tangkapDanDaftarWajah()">Pindai & Daftarkan Wajah</button>
        
        <hr>
        <h5 class="mb-3 text-success">Menu Manajemen & Laporan</h5>
        <button class="btn btn-success w-100 mb-2" onclick="manualSync()">🔄 Sinkronisasi Ulang Data Induk Kiosk</button>
        <button class="btn btn-danger w-100" onclick="prosesRekapHarian()">📊 Buat Sheet Rekap Kehadiran Hari Ini</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ⚠️ PASTE URL WEB APP GOOGLE APPS SCRIPT-MU DI SINI
  const URL_API_GAS = "PASANG_URL_DEPLOYMENT_GAS_KAMU_DISINI";

  let databaseWajahLokal = [];
  let faceMatcher = null;
  let jedaAbsenUser = false;
  let modeAdminAktif = false;
  let tabBootstrap = null;

  window.onload = function() {
    tabBootstrap = new bootstrap.Tab(document.getElementById('absen-tab'));
    const statusBox = document.getElementById('status-sistem');
    
    mulaiKamera();
    
    statusBox.className = "alert alert-warning mb-3";
    statusBox.innerText = "Kamera aktif. Memuat modul kecerdasan buatan (AI)...";

    setTimeout(async () => {
      try {
        const MODEL_URL = 'https://unpkg.com/@vladmandic/face-api/model/';
        
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        await sinkronisasiDatabase();
        
        statusBox.className = "alert alert-success mb-3";
        statusBox.innerText = "Sistem Siap! AI & Database Wajah Aktif.";
      } catch (err) {
        console.error("AI gagal dimuat:", err);
        statusBox.className = "alert alert-danger mb-3";
        statusBox.innerText = "Gagal memuat AI. Periksa koneksi internet.";
      }
    }, 100);
  };

  function mulaiKamera() {
    const video = document.getElementById('webcam');
    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play().catch(e => console.log("Gagal play otomatis:", e));
        };
        setInterval(prosesMengenaliWajahBerkala, 500); 
      })
      .catch(err => {
        console.error("Kamera diblokir:", err);
        alert("Gagal mengakses kamera: " + err.name);
      });
  }

  // MEKANISME CACHING DATABASE KE LOKAL HP KIOSK VIA FETCH HTTP
  async function sinkronisasiDatabase() {
    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "ambil_induk" })
      });
      const hasil = await response.json();
      const dataDariSheets = hasil.data;

      if (!dataDariSheets || dataDariSheets.length === 0) {
        databaseWajahLokal = [];
        faceMatcher = null;
        console.log("Database kosong. Siap merekam.");
        return;
      }

      const labeledDescriptors = [];
      dataDariSheets.forEach(user => {
        try {
          if (user.vektorTeks) {
            const descriptorArray = new Float32Array(JSON.parse(user.vektorTeks));
            labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(user.id + "||" + user.nama + "||" + user.kelas, [descriptorArray]));
          }
        } catch(e) { console.error("Gagal membaca data user:", e); }
      });

      if(labeledDescriptors.length > 0) {
        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.4);
      }
    } catch (err) {
      console.error("Gagal sinkronisasi data dari Sheets:", err);
    }
  }

  async function manualSync() {
    document.getElementById('status-sistem').innerText = "Menyinkronkan data induk...";
    await sinkronisasiDatabase();
    document.getElementById('status-sistem').innerText = "Sinkronisasi Berhasil!";
    alert("Database lokal Kiosk berhasil diperbarui!");
  }

  async function prosesMengenaliWajahBerkala() {
    const video = document.getElementById('webcam');
    if (!video.srcObject || jedaAbsenUser || modeAdminAktif || !faceMatcher) return;

    const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

    if (deteksi) {
      const hasilCocok = faceMatcher.findBestMatch(deteksi.descriptor);
      if (hasilCocok.label !== 'unknown') {
        const [id, nama, kelas] = hasilCocok.label.split('||');
        eksekusiKirimAbsenKeGAS(id, nama, kelas);
      }
    }
  }

  // MENEMBAK LOG ABSEN KE BACKEND JIKA COCOK DENGAN DATA CACHE
  async function eksekusiKirimAbsenKeGAS(id, nama, kelas) {
    jedaAbsenUser = true;
    const logBox = document.getElementById('log-absen-terakhir');
    logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-warning text-dark shadow-sm";
    logBox.innerText = "Mencatat kehadiran " + nama + " (" + kelas + ")...";

    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "catat_absen", id: id, nama: nama, kelas: kelas })
      });
      const respons = await response.json();

      logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-success text-white shadow-sm";
      logBox.innerHTML = "🎯 ABSEN BERHASIL!<br>" + nama + "<br>Kelas: " + kelas;
    } catch (err) {
      logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-danger text-white shadow-sm";
      logBox.innerText = "Gagal mengirim data absen ke server.";
    }

    setTimeout(() => {
      logBox.className = "card status-card d-flex align-items-center justify-content-center p-3 bg-white text-dark shadow-sm";
      logBox.innerText = "Silakan berdiri di depan kamera untuk absen";
      jedaAbsenUser = false;
    }, 3000);
  }

  async function tangkapDanDaftarWajah() {
    const id = document.getElementById('reg-id').value.trim();
    const nama = document.getElementById('reg-nama').value.trim();
    const kelas = document.getElementById('reg-kelas').value.trim();
    const video = document.getElementById('webcam');
    
    if (!id || !nama || !kelas) { alert("Semua kolom form wajib diisi!"); return; }

    const deteksi = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
    if (!deteksi) { alert("Wajah tidak terdeteksi!"); return; }

    const descriptorString = JSON.stringify(Array.from(deteksi.descriptor));
    
    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "simpan_wajah", id: id, nama: nama, kelas: kelas, descriptor: descriptorString })
      });
      const respons = await response.json();
      alert(respons.status);
      
      document.getElementById('reg-id').value = "";
      document.getElementById('reg-nama').value = "";
      document.getElementById('reg-kelas').value = "";
      
      await sinkronisasiDatabase();
      aktifkanModeAbsen();
    } catch(e) {
      alert("Gagal mendaftarkan wajah baru.");
    }
  }

  async function prosesRekapHarian() {
    if (!confirm("Apakah Anda ingin membuat rekapitulasi kehadiran berdasarkan kelas untuk hari ini?")) return;
    
    document.getElementById('status-sistem').className = "alert alert-warning mb-3";
    document.getElementById('status-sistem').innerText = "Sedang menyusun laporan rekap... Silakan tunggu.";
    
    try {
      const response = await fetch(URL_API_GAS, {
        method: "POST",
        body: JSON.stringify({ aksi: "buat_rekap" })
      });
      const respons = await response.json();
      alert(respons.status);
    } catch (e) {
      alert("Gagal memproses rekap harian.");
    }
    aktifkanModeAbsen();
  }

  // PERBAIKAN SINKRONISASI VISUAL TAB BOOTSTRAP
  function bukaMenuAdmin() {
    const pin = prompt("Masukkan PIN Keamanan Admin:");
    if (pin === "1234") {
      modeAdminAktif = true;
      const adminTabEl = document.getElementById('admin-tab');
      const tab = bootstrap.Tab.getOrCreateInstance(adminTabEl);
      tab.show();
    } else {
      alert("PIN Salah!");
      const absenTabEl = document.getElementById('absen-tab');
      const tab = bootstrap.Tab.getOrCreateInstance(absenTabEl);
      tab.show();
    }
  }

  function aktifkanModeAbsen() {
    modeAdminAktif = false;
    const absenTabEl = document.getElementById('absen-tab');
    const tab = bootstrap.Tab.getOrCreateInstance(absenTabEl);
    tab.show();
    document.getElementById('status-sistem').className = "alert alert-success mb-3";
    document.getElementById('status-sistem').innerText = "Sistem Siap! Kamera aktif.";
  }
</script>
</body>
</html>
